  vetGetBooking:
    handler: src/functions/vet/vetGetBooking.handler
    events:
      - httpApi:
          path: /vet/bookings/{bookingId}
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:BatchGetItem
        Resource: !GetAtt FurcircleTable.Arn

  vetGetAgoraToken:
    handler: src/functions/vet/vetGetAgoraToken.handler
    events:
      - httpApi:
          path: /vet/bookings/{bookingId}/token
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource: !GetAtt FurcircleTable.Arn
      - Effect: Allow
        Action:
          - ssm:GetParameter
        Resource:
          - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/furcircle/${self:provider.stage}/agora/appId
          - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/furcircle/${self:provider.stage}/agora/appCertificate

  vetSubmitPostCallSummary:
    handler: src/functions/vet/vetSubmitPostCallSummary.handler
    events:
      - httpApi:
          path: /vet/bookings/{bookingId}/summary
          method: POST
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:UpdateItem
          - dynamodb:PutItem
        Resource: !GetAtt FurcircleTable.Arn
      - Effect: Allow
        Action:
          - sns:Publish
        Resource: !Ref NotificationsTopic

  vetListThreads:
    handler: src/functions/vet/vetListThreads.handler
    events:
      - httpApi:
          path: /vet/threads
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
          - dynamodb:BatchGetItem
        Resource:
          - !GetAtt FurcircleTable.Arn
          - !Sub "${FurcircleTable.Arn}/index/*"

  vetGetThread:
    handler: src/functions/vet/vetGetThread.handler
    events:
      - httpApi:
          path: /vet/threads/{threadId}
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:BatchGetItem
          - dynamodb:Query
        Resource:
          - !GetAtt FurcircleTable.Arn

  vetSendMessage:
    handler: src/functions/vet/vetSendMessage.handler
    events:
      - httpApi:
          path: /vet/threads/{threadId}/messages
          method: POST
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
        Resource: !GetAtt FurcircleTable.Arn
      - Effect: Allow
        Action:
          - sns:Publish
        Resource: !Ref NotificationsTopic

  vetCloseThread:
    handler: src/functions/vet/vetCloseThread.handler
    events:
      - httpApi:
          path: /vet/threads/{threadId}/close
          method: PUT
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:UpdateItem
        Resource: !GetAtt FurcircleTable.Arn
      - Effect: Allow
        Action:
          - sns:Publish
        Resource: !Ref NotificationsTopic

  vetMarkThreadRead:
    handler: src/functions/vet/vetMarkThreadRead.handler
    events:
      - httpApi:
          path: /vet/threads/{threadId}/read
          method: PUT
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:Query
          - dynamodb:UpdateItem
        Resource: !GetAtt FurcircleTable.Arn

  vetGetDashboard:
    handler: src/functions/vet/vetGetDashboard.handler
    events:
      - httpApi:
          path: /vet/dashboard
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !GetAtt FurcircleTable.Arn
          - !Sub "${FurcircleTable.Arn}/index/*"

  vetGetNotifications:
    handler: src/functions/vet/vetGetNotifications.handler
    events:
      - httpApi:
          path: /vet/notifications
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource: !GetAtt FurcircleTable.Arn

  vetMarkNotificationRead:
    handler: src/functions/vet/vetMarkNotificationRead.handler
    events:
      - httpApi:
          path: /vet/notifications/{notifId}/read
          method: PUT
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:UpdateItem
        Resource: !GetAtt FurcircleTable.Arn

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20

plugins: []

resources:
  Resources:
    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: furcircle-users-${self:provider.stage}
        UsernameAttributes:
          - email
        AutoVerifiedAttributes:
          - email
        Schema:
          - Name: email
            Required: true
            Mutable: false
          - Name: given_name
            Required: true
            Mutable: true
          - Name: family_name
            Required: true
            Mutable: true
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireUppercase: true
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: false
        MfaConfiguration: 'OFF'
        LambdaConfig:
          PostConfirmation: !GetAtt PostConfirmationLambdaFunction.Arn

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: furcircle-app
        UserPoolId: !Ref CognitoUserPool
        GenerateSecret: false
        ExplicitAuthFlows:
          - ALLOW_USER_SRP_AUTH
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH

    CognitoGroupOwners:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: owners
        UserPoolId: !Ref CognitoUserPool

    CognitoGroupVets:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: vets
        UserPoolId: !Ref CognitoUserPool

    # Grants Cognito permission to invoke the postConfirmation Lambda
    PostConfirmationInvokePermission:
      Type: AWS::Lambda::Permission
      Properties:
        Action: lambda:InvokeFunction
        FunctionName: !GetAtt PostConfirmationLambdaFunction.Arn
        Principal: cognito-idp.amazonaws.com
        SourceArn: !GetAtt CognitoUserPool.Arn

    FurcircleTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: furcircle-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
          - AttributeName: GSI2PK
            AttributeType: S
          - AttributeName: GSI2SK
            AttributeType: S
          - AttributeName: GSI3PK
            AttributeType: S
          - AttributeName: GSI3SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: GSI2
            KeySchema:
              - AttributeName: GSI2PK
                KeyType: HASH
              - AttributeName: GSI2SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: GSI3
            KeySchema:
              - AttributeName: GSI3PK
                KeyType: HASH
              - AttributeName: GSI3SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    DogPhotosBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: furcircle-dog-photos-${self:provider.stage}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        # No CORS needed — mobile native app uploads directly via presigned URL (not a browser)

    NotificationsTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: furcircle-notifications-${self:provider.stage}

    # Step Functions role uses wildcard Lambda ARN to avoid circular deps
    StepFunctionsRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: states.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: InvokeLambda
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: lambda:InvokeFunction
                  Resource: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:furbeta-${self:provider.stage}-*

    GeneratePlanStateMachine:
      Type: AWS::StepFunctions::StateMachine
      Properties:
        StateMachineName: furcircle-generate-plan-${self:provider.stage}
        RoleArn: !GetAtt StepFunctionsRole.Arn
        DefinitionString: !Sub |
          {
            "Comment": "FurCircle AI plan generation",
            "StartAt": "ValidateInput",
            "States": {
              "ValidateInput": {
                "Type": "Task",
                "Resource": "${ValidateInputLambdaFunction.Arn}",
                "Next": "CallClaude",
                "Catch": [{ "ErrorEquals": ["States.ALL"], "Next": "HandleError" }]
              },
              "CallClaude": {
                "Type": "Task",
                "Resource": "${CallClaudeLambdaFunction.Arn}",
                "Retry": [{ "ErrorEquals": ["States.ALL"], "MaxAttempts": 2, "IntervalSeconds": 5 }],
                "Next": "SavePlan",
                "Catch": [{ "ErrorEquals": ["States.ALL"], "Next": "HandleError" }]
              },
              "SavePlan": {
                "Type": "Task",
                "Resource": "${SavePlanLambdaFunction.Arn}",
                "Next": "NotifyUser",
                "Catch": [{ "ErrorEquals": ["States.ALL"], "Next": "HandleError" }]
              },
              "NotifyUser": {
                "Type": "Task",
                "Resource": "${NotifyPlanReadyLambdaFunction.Arn}",
                "End": true
              },
              "HandleError": {
                "Type": "Task",
                "Resource": "${HandlePlanErrorLambdaFunction.Arn}",
                "End": true
              }
            }
          }

  Outputs:
    UserPoolId:
      Value: !Ref CognitoUserPool
      Export:
        Name: ${self:service}-${self:provider.stage}-UserPoolId
    UserPoolClientId:
      Value: !Ref CognitoUserPoolClient
      Export:
        Name: ${self:service}-${self:provider.stage}-UserPoolClientId
    TableName:
      Value: !Ref FurcircleTable
      Export:
        Name: ${self:service}-${self:provider.stage}-TableName
    BucketName:
      Value: !Ref DogPhotosBucket
      Export:
        Name: ${self:service}-${self:provider.stage}-BucketName
    SnsTopicArn:
      Value: !Ref NotificationsTopic
      Export:
        Name: ${self:service}-${self:provider.stage}-SnsTopicArn
