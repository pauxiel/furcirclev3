org: pauxiel
service: furbeta

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  memorySize: 256
  timeout: 29
  stage: ${opt:stage, 'dev'}
  environment:
    STAGE: ${self:provider.stage}
    TABLE_NAME: !Ref FurcircleTable
    BUCKET_NAME: !Ref DogPhotosBucket
    SNS_TOPIC_ARN: !Ref NotificationsTopic
    STATE_MACHINE_ARN: !Sub arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:furcircle-generate-plan-${self:provider.stage}
    ANTHROPIC_API_KEY_SSM: /furcircle/${self:provider.stage}/anthropic/apiKey
    # USER_POOL_ID and USER_POOL_CLIENT_ID intentionally omitted from global env
    # to avoid circular dep: CognitoUserPool.LambdaConfig -> postConfirmation -> CognitoUserPool
    # postConfirmation reads pool ID from event.userPoolId at runtime
  httpApi:
    authorizers:
      cognitoAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}
        audience:
          - !Ref CognitoUserPoolClient

functions:
  # No events — triggered by Cognito LambdaConfig in resources section
  postConfirmation:
    handler: src/functions/auth/postConfirmation.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:PutItem
        Resource: !GetAtt FurcircleTable.Arn
      - Effect: Allow
        Action:
          - cognito-idp:AdminAddUserToGroup
        Resource: !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*

  getMe:
    handler: src/functions/owners/getMe.handler
    events:
      - httpApi:
          path: /owners/me
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:BatchGetItem
        Resource: !GetAtt FurcircleTable.Arn

  updateMe:
    handler: src/functions/owners/updateMe.handler
    events:
      - httpApi:
          path: /owners/me
          method: PUT
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:UpdateItem
        Resource: !GetAtt FurcircleTable.Arn

  createDog:
    handler: src/functions/dogs/createDog.handler
    events:
      - httpApi:
          path: /dogs
          method: POST
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:PutItem
          - dynamodb:BatchWriteItem
        Resource: !GetAtt FurcircleTable.Arn
      - Effect: Allow
        Action:
          - states:StartExecution
        # Use Sub with name to avoid circular dep with GeneratePlanStateMachine resource
        Resource: !Sub arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:furcircle-generate-plan-${self:provider.stage}

  listDogs:
    handler: src/functions/dogs/listDogs.handler
    events:
      - httpApi:
          path: /dogs
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !GetAtt FurcircleTable.Arn
          - !Sub ${FurcircleTable.Arn}/index/GSI1

  getDog:
    handler: src/functions/dogs/getDog.handler
    events:
      - httpApi:
          path: /dogs/{dogId}
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:Query
        Resource:
          - !GetAtt FurcircleTable.Arn
          - !Sub ${FurcircleTable.Arn}/index/GSI1

  updateDog:
    handler: src/functions/dogs/updateDog.handler
    events:
      - httpApi:
          path: /dogs/{dogId}
          method: PUT
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:UpdateItem
        Resource: !GetAtt FurcircleTable.Arn

  getDogPhotoUrl:
    handler: src/functions/dogs/getDogPhotoUrl.handler
    events:
      - httpApi:
          path: /dogs/{dogId}/photo
          method: POST
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource: !GetAtt FurcircleTable.Arn
      - Effect: Allow
        Action:
          - s3:PutObject
        Resource: !Sub ${DogPhotosBucket.Arn}/*

  getCurrentPlan:
    handler: src/functions/dogs/getCurrentPlan.handler
    events:
      - httpApi:
          path: /dogs/{dogId}/plan
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:Query
        Resource: !GetAtt FurcircleTable.Arn

  logActivity:
    handler: src/functions/wellness/logActivity.handler
    events:
      - httpApi:
          path: /dogs/{dogId}/activities
          method: POST
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
          - dynamodb:UpdateItem
        Resource: !GetAtt FurcircleTable.Arn

  getActivities:
    handler: src/functions/wellness/getActivities.handler
    events:
      - httpApi:
          path: /dogs/{dogId}/activities
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:Query
        Resource:
          - !GetAtt FurcircleTable.Arn
          - !Sub ${FurcircleTable.Arn}/index/GSI1

  getMonthlyJourney:
    handler: src/functions/wellness/getMonthlyJourney.handler
    events:
      - httpApi:
          path: /dogs/{dogId}/journey
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:Query
        Resource:
          - !GetAtt FurcircleTable.Arn
          - !Sub ${FurcircleTable.Arn}/index/GSI1

  getHomeScreen:
    handler: src/functions/wellness/getHomeScreen.handler
    events:
      - httpApi:
          path: /home
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:BatchGetItem
          - dynamodb:Query
        Resource:
          - !GetAtt FurcircleTable.Arn
          - !Sub ${FurcircleTable.Arn}/index/GSI1

  validateInput:
    handler: src/functions/plan/validateInput.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource: !GetAtt FurcircleTable.Arn

  callClaude:
    handler: src/functions/plan/callClaude.handler
    timeout: 60
    iamRoleStatements:
      - Effect: Allow
        Action:
          - ssm:GetParameter
        Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/furcircle/${self:provider.stage}/anthropic/apiKey

  savePlan:
    handler: src/functions/plan/savePlan.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:PutItem
          - dynamodb:UpdateItem
        Resource: !GetAtt FurcircleTable.Arn

  notifyPlanReady:
    handler: src/functions/plan/notifyPlanReady.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource: !GetAtt FurcircleTable.Arn
      - Effect: Allow
        Action:
          - sns:Publish
        Resource: !Ref NotificationsTopic

  handlePlanError:
    handler: src/functions/plan/handlePlanError.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:UpdateItem
        Resource: !GetAtt FurcircleTable.Arn
      - Effect: Allow
        Action:
          - sns:Publish
        Resource: !Ref NotificationsTopic

  triggerMonthlyRefresh:
    handler: src/functions/plan/triggerMonthlyRefresh.handler
    timeout: 300
    events:
      - schedule:
          rate: cron(0 0 1 * ? *)
          enabled: true
    environment:
      STATE_MACHINE_ARN: !Sub arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:furcircle-generate-plan-${self:provider.stage}
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource: !Sub ${FurcircleTable.Arn}/index/GSI1
      - Effect: Allow
        Action:
          - states:StartExecution
        Resource: !Sub arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:furcircle-generate-plan-${self:provider.stage}

  createThread:
    handler: src/functions/threads/createThread.handler
    events:
      - httpApi:
          path: /threads
          method: POST
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
        Resource: !GetAtt FurcircleTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Sub ${FurcircleTable.Arn}/index/GSI1
      - Effect: Allow
        Action:
          - sns:Publish
        Resource: !Ref NotificationsTopic

  listThreads:
    handler: src/functions/threads/listThreads.handler
    events:
      - httpApi:
          path: /threads
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !GetAtt FurcircleTable.Arn
          - !Sub ${FurcircleTable.Arn}/index/GSI1
      - Effect: Allow
        Action:
          - dynamodb:BatchGetItem
        Resource: !GetAtt FurcircleTable.Arn

  getThread:
    handler: src/functions/threads/getThread.handler
    events:
      - httpApi:
          path: /threads/{threadId}
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:Query
        Resource: !GetAtt FurcircleTable.Arn

  sendMessage:
    handler: src/functions/threads/sendMessage.handler
    events:
      - httpApi:
          path: /threads/{threadId}/messages
          method: POST
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
        Resource: !GetAtt FurcircleTable.Arn
      - Effect: Allow
        Action:
          - sns:Publish
        Resource: !Ref NotificationsTopic

  markThreadRead:
    handler: src/functions/threads/markThreadRead.handler
    events:
      - httpApi:
          path: /threads/{threadId}/read
          method: PUT
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:Query
          - dynamodb:UpdateItem
        Resource: !GetAtt FurcircleTable.Arn

  closeExpiredThreads:
    handler: src/functions/threads/closeExpiredThreads.handler
    timeout: 300
    events:
      - schedule: cron(0 1 * * ? *)
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Scan
          - dynamodb:UpdateItem
          - dynamodb:GetItem
        Resource: !GetAtt FurcircleTable.Arn
      - Effect: Allow
        Action:
          - sns:Publish
        Resource: !Ref NotificationsTopic

  # ── Phase 4: Subscriptions ─────────────────────────────────────────────────

  getSubscriptionPlans:
    handler: src/functions/subscriptions/getSubscriptionPlans.handler
    events:
      - httpApi:
          path: /subscriptions/plans
