        Resource: !GetAtt FurcircleTable.Arn

  vetSetAvailability:
    handler: src/functions/vet/vetSetAvailability.handler
    events:
      - httpApi:
          path: /vet/availability/{date}
          method: PUT
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
        Resource: !GetAtt FurcircleTable.Arn

  vetBulkSetAvailability:
    handler: src/functions/vet/vetBulkSetAvailability.handler
    events:
      - httpApi:
          path: /vet/availability
          method: PUT
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
