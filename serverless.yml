    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:UpdateItem
        Resource: !GetAtt FurcircleTable.Arn
      - Effect: Allow
        Action:
          - ssm:GetParameter
        Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/furcircle/${self:provider.stage}/stripe/*

  subscribeToPlan:
    handler: src/functions/subscriptions/subscribeToPlan.handler
    events:
      - httpApi:
          path: /subscriptions
          method: POST
          authorizer:
            name: cognitoAuthorizer
    environment:
      STRIPE_PRICE_ID_PROTECTOR: ${ssm:/furcircle/${self:provider.stage}/stripe/protectorPriceId}
      STRIPE_PRICE_ID_PROACTIVE: ${ssm:/furcircle/${self:provider.stage}/stripe/proactivePriceId}
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:UpdateItem
        Resource: !GetAtt FurcircleTable.Arn
      - Effect: Allow
        Action:
          - ssm:GetParameter
        Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/furcircle/${self:provider.stage}/stripe/*

  cancelSubscription:
    handler: src/functions/subscriptions/cancelSubscription.handler
    events:
      - httpApi:
          path: /subscriptions
          method: DELETE
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:UpdateItem
        Resource: !GetAtt FurcircleTable.Arn
      - Effect: Allow
        Action:
          - ssm:GetParameter
        Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/furcircle/${self:provider.stage}/stripe/*

  topUpCredits:
    handler: src/functions/subscriptions/topUpCredits.handler
    events:
      - httpApi:
          path: /subscriptions/credits/topup
          method: POST
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:UpdateItem
        Resource: !GetAtt FurcircleTable.Arn
      - Effect: Allow
        Action:
          - ssm:GetParameter
        Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/furcircle/${self:provider.stage}/stripe/*

  stripeWebhook:
    handler: src/functions/subscriptions/stripeWebhook.handler
    events:
      - httpApi:
          path: /webhooks/stripe
          method: POST
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
          - dynamodb:UpdateItem
        Resource:
          - !GetAtt FurcircleTable.Arn
          - !Sub "${FurcircleTable.Arn}/index/*"
      - Effect: Allow
        Action:
          - ssm:GetParameter
        Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/furcircle/${self:provider.stage}/stripe/*

  listProviders:
    handler: src/functions/providers/listProviders.handler
    events:
      - httpApi:
          path: /providers
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
          - dynamodb:GetItem
        Resource:
          - !GetAtt FurcircleTable.Arn
          - !Sub "${FurcircleTable.Arn}/index/*"

  getProvider:
    handler: src/functions/providers/getProvider.handler
    events:
      - httpApi:
          path: /providers/{vetId}
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:Query
        Resource:
          - !GetAtt FurcircleTable.Arn
          - !Sub "${FurcircleTable.Arn}/index/*"

  getProviderAvailability:
    handler: src/functions/providers/getProviderAvailability.handler
    events:
      - httpApi:
          path: /providers/{vetId}/availability
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !GetAtt FurcircleTable.Arn

  getProviderAssessment:
    handler: src/functions/providers/getProviderAssessment.handler
    events:
      - httpApi:
          path: /providers/{vetId}/assessment
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Sub "${FurcircleTable.Arn}/index/*"

  submitAssessment:
    handler: src/functions/assessments/submitAssessment.handler
    events:
      - httpApi:
          path: /assessments
          method: POST
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
          - dynamodb:PutItem
        Resource:
          - !GetAtt FurcircleTable.Arn
          - !Sub "${FurcircleTable.Arn}/index/*"
      - Effect: Allow
        Action:
          - sns:Publish
        Resource: !Ref NotificationsTopic

  getAssessment:
    handler: src/functions/assessments/getAssessment.handler
    events:
      - httpApi:
          path: /assessments/{assessmentId}
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
