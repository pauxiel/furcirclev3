          path: /bookings
          method: POST
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:UpdateItem
          - dynamodb:PutItem
        Resource:
          - !GetAtt FurcircleTable.Arn
      - Effect: Allow
        Action:
          - sns:Publish
        Resource: !Ref NotificationsTopic

  listBookings:
    handler: src/functions/bookings/listBookings.handler
    events:
      - httpApi:
          path: /bookings
          method: GET
          authorizer:
            name: cognitoAuthorizer
    iamRoleStatements:
      - Effect: Allow
